name: Build Windows Installer Release Asset

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload installer asset to"
        required: true
        default: "v0.4.0"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows NSIS installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 手动触发时切到指定 tag 的代码；push tag 事件时 ref_name 即为该 tag
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend checks
        run: npm run check

      - name: Build Tauri Windows installer
        run: npm run tauri:build

      - name: List installer outputs
        shell: pwsh
        run: |
          Get-ChildItem -Recurse src-tauri/target/release/bundle | Format-Table FullName, Length

      - name: Upload installer to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          # 手动触发用 inputs.tag；push tag 事件用 ref_name
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          $assets = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*.exe"
          if (-not $assets) {
            throw "No NSIS .exe installer found under src-tauri/target/release/bundle/nsis"
          }

          # Release 实体不会随 tag 自动创建，需先确保存在。
          # 幂等：已存在则跳过创建，直接上传资产（--clobber 覆盖同名资产）。
          if (-not (gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY 2>$null)) {
            gh release create $env:RELEASE_TAG `
              --repo $env:GITHUB_REPOSITORY `
              --title "$env:RELEASE_TAG" `
              --notes "由 CI 自动构建并发布的 Windows 安装包。详见对应 tag 的提交说明与 README 修复记录。"
          }

          foreach ($asset in $assets) {
            gh release upload $env:RELEASE_TAG $asset.FullName --repo $env:GITHUB_REPOSITORY --clobber
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
